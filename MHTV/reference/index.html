<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaHoard | Your Ultimate Media Collection</title>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#39E079',
                        'secondary-accent': '#437f34',
                        'background-dark': '#122017',
                        'sidebar-dark': '#07121E',
                        'card-dark': '#1A2B42',
                        'text-light': '#B0C4DE',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Sora', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #122017;
            color: white;
            -webkit-font-smoothing: antialiased;
        }

        .text-gradient {
            background: linear-gradient(135deg, #fff 0%, #39E079 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass {
            background: rgba(26, 43, 66, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-5px);
            border-color: #39E079;
            box-shadow: 0 10px 30px -10px rgba(57, 224, 121, 0.2);
        }

        .skewed-mockup {
            transform: rotateY(-20deg) rotateX(8deg) rotateZ(2deg);
            transition: all 0.5s ease;
        }

        @media (max-width: 1024px) {
            .skewed-mockup {
                transform: none;
            }
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
